<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evergreen Test Units</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="open">
      <div class="sidebar-header">
        <div>
          <h1>Evergreen Test Units</h1>
          <p class="sub">Click a test unit to see all artifact categories and counts from that unit.</p>
        </div>
        <button id="toggleSidebar" class="toggle-btn" aria-label="Hide sidebar">⟨</button>
      </div>

      <div class="controls">
        <label for="artifact">Highlight by category</label>
        <select id="artifact"></select>

        <label for="minrange">Minimum count: <span id="minval">0</span></label>
        <input type="range" id="minrange" min="0" max="500" value="0" step="1" />

        <button id="resetBtn">Reset</button>
      </div>

      <div class="legend">
        <div><strong>Default:</strong> all test units shown</div>
        <div><strong>Filter:</strong> color by selected category count</div>
      </div>

      <section id="selectionPanel">
        <h2>Selected Unit</h2>
        <div id="selectionContent" class="empty-state">
          Tap or click a test unit to view artifact categories and counts.
        </div>
      </section>

      <section id="summary">
        <h2>Map summary</h2>
        <div id="summaryText">All test units are shown.</div>
      </section>
    </aside>

    <button id="floatingOpenBtn" class="floating-open hidden" aria-label="Show sidebar">☰</button>
    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    window.FIELD_LABELS = {"t_beads": "Beads", "t_brick": "Brick", "t_bullet": "Bullets", "t_button": "Buttons", "t_cerobj": "Ceramic Objects", "t_cershrd": "Ceramic Sherds", "t_coalchr": "Coal / Charcoal", "t_coin": "Coin", "t_concrt": "Concrete", "t_faunbn": "Faunal Bone", "t_glass": "Glass", "t_glassobj": "Glass Objects", "t_graphite": "Graphite", "t_grndstn": "Groundstone", "t_gunflint": "Gunflint", "t_lead": "Lead", "t_lithics": "Lithics", "t_marbles": "Marbles", "t_metid": "Metal Identified", "t_metuid": "Metal Unidentified", "t_mortar": "Mortar", "t_nails": "Nails", "t_other": "Other", "t_plastic": "Plastic", "t_rubber": "Rubber", "t_shell": "Shell", "t_slag": "Slag", "all_total": "All Artifacts"};
    window.FILTER_FIELDS = ["all_total", "t_beads", "t_brick", "t_bullet", "t_button", "t_cerobj", "t_cershrd", "t_coalchr", "t_coin", "t_concrt", "t_faunbn", "t_glass", "t_glassobj", "t_graphite", "t_grndstn", "t_gunflint", "t_lead", "t_lithics", "t_marbles", "t_metid", "t_metuid", "t_mortar", "t_nails", "t_other", "t_plastic", "t_rubber", "t_shell", "t_slag"];
  </script>
  <script src="app.js"></script>
</body>
</html>
